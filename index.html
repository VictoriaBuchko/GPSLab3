<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="brand">
        <div>
            <h1>GPS Visualization</h1>
        </div>
    </div>
    <div class="status-pill">
        <div class="status-dot" id="dot"></div>
        <span id="statusLabel">Disconnected</span>
    </div>
</header>

<div class="params-card">
    <div class="card-title">Параметри емулятора</div>
    <div class="params-grid">
        <div class="field">
            <label>Розмір зони (км)</label>
            <input type="number" id="inZone" value="200">
        </div>
        <div class="field">
            <label>Частота повідомлень (1/с)</label>
            <input type="number" id="inFreq" value="1" step="0.5">
        </div>
        <div class="field">
            <label>Швидкість супутників (км/год)</label>
            <input type="number" id="inSatSpeed" value="100">
        </div>
        <div class="field">
            <label>Швидкість об'єкта (км/год)</label>
            <input type="number" id="inObjSpeed" value="10">
        </div>
    </div>
    <div class="btn-row">
        <button class="btn btn-primary" onclick="applyConfig()">Застосувати параметри</button>
        <button class="btn btn-secondary" onclick="clearData()">Очистити дані</button>
    </div>
</div>

<div class="layout">
    <div class="plot-card">
        <div class="plot-card-header">Декартові координати · Супутники та положення об'єкта</div>
        <div class="chart-wrap">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <div class="info-panel">

        <div class="info-card">
            <div class="card-title">Інформація</div>
            <div class="info-row">
                <span class="label">Супутників</span>
                <span class="val blue" id="satCount">0</span>
            </div>
            <div class="info-row">
                <span class="label">Статус</span>
                <span class="val" id="visibilityStatus" style="font-size:0.8em">—</span>
            </div>
            <div class="info-row">
                <span class="label">Аналітичний</span>
                <span class="val green" id="anaPos">—</span>
            </div>
            <div class="info-row">
                <span class="label">Чисельний</span>
                <span class="val orange" id="numPos">—</span>
            </div>
            <div class="info-row">
                <span class="label">Різниця (км)</span>
                <span class="val" id="diff">—</span>
            </div>
        </div>

        <div class="info-card">
            <div class="card-title">Легенда</div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#58a6ff"></div>
                Супутники
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#39d353"></div>
                Аналітичний метод
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#ffa657"></div>
                Чисельний метод
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
